# Base configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'jenkins'
    # NOTE: the backslash at the end is necessary for this to work with jenkins
    metrics_path: /prometheus/
    static_configs:
      - targets: ['jenkins:8080']
