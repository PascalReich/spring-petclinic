services:
  petclinic:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=mysql
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/petclinic
      - SPRING_DATASOURCE_USERNAME=petclinic
      - SPRING_DATASOURCE_PASSWORD=petclinic
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - devsecops-net
  mysql:
    image: mysql:9.6
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=
      - MYSQL_ALLOW_EMPTY_PASSWORD=true
      - MYSQL_USER=petclinic
      - MYSQL_PASSWORD=petclinic
      - MYSQL_DATABASE=petclinic
    volumes:
      - "./conf.d:/etc/mysql/conf.d:ro"
      - mysql_volume:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - devsecops-net
  sonarqube:
    build: ./sonarqube
    container_name: sonarqube
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/api/system/status | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - devsecops-net
  prometheus:
    build: ./prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    networks:
      - devsecops-net

  grafana:
    build: ./grafana
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - devsecops-net
  owasp-zap:
    build: ./owasp-zap
    container_name: owasp-zap
    ports:
      - "8082:8080"
    networks:
      - devsecops-net
  sonarqube-init:
    image: curlimages/curl:latest
    user: root
    depends_on:
      sonarqube:
        condition: service_healthy
    command: >
      sh -c "
      if [ -f /run/secrets/sonar-token ]; then
        echo 'Token already exists, skipping generation';
        exit 0;
      fi;
      token=$$(curl -s -u admin:admin -X POST
      'http://sonarqube:9000/api/user_tokens/generate?name=jenkins-token'
      | grep -o '\"token\":\"[^\"]*\"' | cut -d'\"' -f4);
      if [ -z \"$$token\" ]; then
        echo 'Failed to generate token';
        exit 1;
      fi;
      echo -n \"$$token\" > /run/secrets/sonar-token;
      echo 'Token written successfully'
      "
    volumes:
      - sonar_token:/run/secrets
    networks:
      - devsecops-net

  jenkins:
    build: ./jenkins
    container_name: jenkins
    ports:
      - "8085:8080"
    environment:
      CASC_JENKINS_CONFIG: /var/jenkins_home/casc_configs/jenkins.yaml
      SONAR_HOST_URL: http://sonarqube:9000
    depends_on:
      sonarqube-init:
        condition: service_completed_successfully
    volumes:
      - jenkins_volume:/var/jenkins_home
      - ./jenkins/jenkins.yaml:/var/jenkins_home/casc_configs/jenkins.yaml:ro
      - sonar_token:/run/secrets:ro
    networks:
      - devsecops-net
  production:
    build: ./prod
    container_name: production
    ports:
      - "8081:8080"
      - "2222:22"
    networks:
      - devsecops-net
  
volumes:
  mysql_volume:
  jenkins_volume:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  prometheus_data:
  grafana_data:
  sonar_token:

networks:
  devsecops-net:
    name: devsecops-net
    driver: bridge
