services:
  petclinic:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=mysql
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/petclinic
      - SPRING_DATASOURCE_USERNAME=petclinic
      - SPRING_DATASOURCE_PASSWORD=petclinic
    depends_on:
      - mysql
    networks:
      - devsecops-net
  mysql:
    image: mysql:9.6
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=
      - MYSQL_ALLOW_EMPTY_PASSWORD=true
      - MYSQL_USER=petclinic
      - MYSQL_PASSWORD=petclinic
      - MYSQL_DATABASE=petclinic
    volumes:
      - "./conf.d:/etc/mysql/conf.d:ro"
      - mysql_volume:/var/lib/mysql
    networks:
      - devsecops-net
  sonarqube:
    build: ./sonarqube
    container_name: sonarqube
    ports:
      - "9000:9000"
    networks:
      - devsecops-net
  prometheus:
    build: ./prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    networks:
      - devsecops-net

  grafana:
    build: ./grafana
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - devsecops-net
  owasp-zap:
    build: ./owasp-zap
    container_name: owasp-zap
    ports:
      - "8082:8080"
  jenkins:
    build: ./jenkins
    container_name: jenkins
    ports:
      - "8085:8080"
    volumes:
      - jenkins_volume:/var/jenkins_home
    networks:
      - devsecops-net
  production:
    build: ./prod
    container_name: production
    ports:
      - "8081:8080"
      - "2222:22"
    networks:
      - devsecops-net
  
volumes:
  mysql_volume:
  jenkins_volume:
  prometheus_data:
  grafana_data:

networks:
  devsecops-net:
    name: devsecops-net
    driver: bridge
