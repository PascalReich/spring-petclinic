jenkins:
  securityRealm:
    local:
      allowsSignup: false
      enableCaptcha: false
      users:
      - id: "admin"
        name: "admin"
        password: "admin"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
  numExecutors: 2
  scmCheckoutRetryCount: 0
  mode: NORMAL

credentials:
  system:
    domainCredentials:
    - domain: {}
      credentials:
      - string:
          scope: GLOBAL
          id: "sonar-token"
          secret: "${readFile:/run/secrets/sonar-token}"
          description: "SonarQube token"

unclassified:
  location:
    url: "http://localhost:8085/"
  sonarGlobalConfiguration:
    buildWrapperEnabled: false
    installations:
    - name: "sonarqube"
      serverUrl: "${SONAR_HOST_URL}"
      serverAuthenticationToken: "sonar-token"
  scmGit:
    addGitTagAction: false
    createAccountBasedOnEmail: false
  gitHubPluginConfig:
    hookUrl: "http://localhost:8085/github-webhook/"

tool:
  git:
    installations:
    - home: "git"
      name: "Default"
  maven:
    installations:
    - name: "M3"
      properties:
      - installSource:
          installers:
          - maven:
              id: "3.9.14"
  mavenGlobalConfig:
    globalSettingsProvider: "standard"
    settingsProvider: "standard"

jobs:
  - script: >
      pipelineJob('spring-petclinic') {
        definition {
          cps {
            script(readFileFromWorkspace('/var/jenkins_home/Jenkinsfile'))
            sandbox(true)
          }
        }
      }
